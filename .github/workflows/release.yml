name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release (for example v1.2.3)
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$tag" =~ ^v.+$ ]]; then
            echo "Release tag must start with v, got: $tag"
            exit 1
          fi
          echo "value=$tag" >> "$GITHUB_OUTPUT"

      - name: Resolve project version
        id: version
        shell: bash
        run: echo "value=$(./gradlew -q printVersion)" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches project version
        shell: bash
        run: |
          release_tag="${{ steps.release_tag.outputs.value }}"
          tag_version="${release_tag#v}"
          project_version="${{ steps.version.outputs.value }}"
          if [[ "$tag_version" != "$project_version" ]]; then
            echo "Tag ${release_tag} does not match project version ${project_version}"
            exit 1
          fi

      - name: Build and verify release artifacts
        shell: bash
        run: ./gradlew --no-daemon clean test shadowJar distZip distTar generateReleaseChecksums verifyReleaseArtifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          generate_release_notes: true
          files: |
            build/distributions/nms-mcp-${{ steps.version.outputs.value }}.zip
            build/distributions/nms-mcp-${{ steps.version.outputs.value }}.tar.gz
            build/libs/nms-mcp-${{ steps.version.outputs.value }}-all.jar
            build/distributions/SHA256SUMS.txt
