name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Resolve project version
        id: version
        shell: bash
        run: echo "value=$(./gradlew -q printVersion)" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches project version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          project_version="${{ steps.version.outputs.value }}"
          if [[ "$tag_version" != "$project_version" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match project version ${project_version}"
            exit 1
          fi

      - name: Build and verify release artifacts
        shell: bash
        run: ./gradlew --no-daemon clean test shadowJar distZip distTar generateReleaseChecksums verifyReleaseArtifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/distributions/nms-mcp-${{ steps.version.outputs.value }}.zip
            build/distributions/nms-mcp-${{ steps.version.outputs.value }}.tar.gz
            build/libs/nms-mcp-${{ steps.version.outputs.value }}-all.jar
            build/distributions/SHA256SUMS.txt
